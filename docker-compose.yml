services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: netwise
      POSTGRES_PASSWORD: password
      POSTGRES_DB: netwise
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netwise -d netwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgres://netwise:password@postgres:5432/netwise?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32chars}
      AES_KEY: ${AES_KEY:-0123456789abcdef0123456789abcdef}
      PORT: 8080
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
